<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم - متاجر البلاد</title>
<style>
    /* حافظت على استايلك الجميل مع إضافة لمسة للـ Loader */
    body { margin: 0; font-family: "Segoe UI", Tahoma, Arial, sans-serif; background: #f7f6f2; display: flex; flex-direction: column; min-height: 100vh; padding-bottom: 80px; }
    header { text-align: center; padding: 20px; font-size: 24px; font-weight: bold; color: #1b1e33; }
    #content { flex: 1; display: flex; justify-content: center; align-items: flex-start; gap: 20px; padding: 20px; flex-wrap: wrap; }
    .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); width: 100%; max-width: 450px; }
    .box h3 { color: #bfa14a; margin-bottom: 12px; }
    input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    button { padding: 12px; width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: linear-gradient(45deg,#c9b36a,#b08d2f); color: #1b1e33; font-size: 16px; margin-top: 5px; }
    .footer-box { display: flex; justify-content: center; gap: 10px; padding: 15px; background: #bfa14a; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; z-index: 100; }
    .footer-box button { flex: 1; background: linear-gradient(45deg,#fff,#e6d38a); margin: 0; }
    #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); color: white; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #bfa14a; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p>جاري المعالجة والرفع...</p>
</div>

<header id="title">لوحة التحكم</header>

<div id="content">
    <div class="box" id="add-box">
        <h3>إضافة منتج جديد</h3>
        <input id="name" placeholder="اسم المنتج">
        <input id="price" placeholder="السعر (مثال: 5000 ريال)">
        <input id="status" placeholder="الحالة (متوفر / غير متوفر)">
        <input type="file" id="imageFile" accept="image/*"> <input id="category" placeholder="التصنيف (أحذية، عطور..)">
        <input id="store" placeholder="المتجر" readonly>
        <button id="addBtn" onclick="add()">حفظ المنتج</button>
    </div>

    <div class="box" id="edit-box" style="display:none;">
        <h3>تعديل المنتجات الحالية</h3>
        <div id="edit-content"></div>
    </div>
</div>

<div class="footer-box">
    <button onclick="showAdd()">إضافة</button>
    <button onclick="showEdit()">تعديل</button>
    <button onclick="logout()" style="background: #ff4d4d; color: white;">خروج</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
// الإعدادات (نفس بياناتك السابقة)
const firebaseConfig = {
    apiKey: "AIzaSyAMEoUTIMAS0mh06_SxrM2T_efDxEmEoxg",
    authDomain: "wafaseiyunshop.firebaseapp.com",
    databaseURL: "https://wafaseiyunshop-default-rtdb.firebaseio.com",
    projectId: "wafaseiyunshop",
    storageBucket: "wafaseiyunshop.firebasestorage.app", // تأكد أن هذا هو رابط الاستورج الخاص بك
    messagingSenderId: "101115796279",
    appId: "1:101115796279:web:3753efad2a443c9b6098b2"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const storage = firebase.storage();

const store = localStorage.getItem("selectedStore");
const logged = localStorage.getItem("storeLoggedIn");

if (!store || logged !== store) {
    alert("انتهت الجلسة، سجل دخولك مرة أخرى");
    window.location.href = "stores.html";
}

document.getElementById("title").innerText = "لوحة تحكم — " + store;
document.getElementById("store").value = store;

// دالة إضافة المنتج مع الضغط والرفع إلى Firebase Storage
function add() {
    const name = document.getElementById("name").value.trim();
    const price = document.getElementById("price").value.trim();
    const status = document.getElementById("status").value.trim();
    const category = document.getElementById("category").value.trim();
    const fileInput = document.getElementById("imageFile");
    const file = fileInput.files[0];

    if (!name || !price || !file) {
        alert("يرجى إكمال البيانات الأساسية (الاسم، السعر، الصورة)");
        return;
    }

    document.getElementById("loader").style.display = "flex";

    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = function(e) {
        const img = new Image();
        img.src = e.target.result;
        img.onload = function() {
            // --- عملية ضغط الصورة ---
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            
            // تحديد أقصى عرض للصورة 800 بكسل لتقليل الحجم
            const MAX_WIDTH = 800;
            let width = img.width;
            let height = img.height;

            if (width > MAX_WIDTH) {
                height *= MAX_WIDTH / width;
                width = MAX_WIDTH;
            }

            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);

            // تحويل الصورة لـ Blob بجودة 0.7 (70%)
            canvas.toBlob(function(blob) {
                const fileName = "products/" + Date.now() + "_" + store + ".jpg";
                const storageRef = storage.ref().child(fileName);
                
                // الرفع إلى Firebase Storage
                storageRef.put(blob).then(snapshot => {
                    return snapshot.ref.getDownloadURL();
                }).then(downloadURL => {
                    // حفظ البيانات في Realtime Database
                    return database.ref("products").push({
                        id: Date.now(),
                        name: name,
                        price: price,
                        status: status,
                        image: downloadURL,
                        category: category,
                        store: store
                    });
                }).then(() => {
                    document.getElementById("loader").style.display = "none";
                    alert("تمت إضافة المنتج بنجاح ✅");
                    location.reload(); // لإعادة تعيين الحقول
                }).catch(err => {
                    document.getElementById("loader").style.display = "none";
                    console.error(err);
                    alert("خطأ في الرفع: " + err.message);
                });
            }, "image/jpeg", 0.7);
        };
    };
}

// تحميل وعرض المنتجات للتعديل
function loadProducts() {
    const container = document.getElementById("edit-content");
    container.innerHTML = "جاري التحميل...";
    
    database.ref("products").orderByChild("store").equalTo(store).once("value", snap => {
        container.innerHTML = "";
        const data = snap.val();
        if(!data) {
            container.innerHTML = "لا توجد منتجات حالية";
            return;
        }

        Object.keys(data).forEach(key => {
            const p = data[key];
            const div = document.createElement("div");
            div.style.borderBottom = "2px solid #eee";
            div.style.padding = "10px 0";
            div.innerHTML = `
                <input value="${p.name}" id="name-${key}">
                <input value="${p.price}" id="price-${key}">
                <input value="${p.status}" id="status-${key}">
                <button onclick="saveEdit('${key}')">تحديث</button>
                <button onclick="deleteProduct('${key}')" style="background:red; color:white;">حذف</button>
            `;
            container.appendChild(div);
        });
    });
}

function saveEdit(key) {
    const updates = {
        name: document.getElementById("name-" + key).value,
        price: document.getElementById("price-" + key).value,
        status: document.getElementById("status-" + key).value
    };
    database.ref("products/" + key).update(updates).then(() => alert("تم التحديث"));
}

function deleteProduct(key) {
    if(confirm("هل أنت متأكد من الحذف؟")) {
        database.ref("products/" + key).remove().then(() => loadProducts());
    }
}

function showAdd() {
    document.getElementById("add-box").style.display = "block";
    document.getElementById("edit-box").style.display = "none";
}

function showEdit() {
    document.getElementById("add-box").style.display = "none";
    document.getElementById("edit-box").style.display = "block";
    loadProducts();
}

function logout() {
    localStorage.removeItem("storeLoggedIn");
    window.location.href = "stores.html";
}
</script>
</body>
</html>
