<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تسجيل دخول المتجر</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background:#f8f8f8; display:flex; justify-content:center; align-items:center; height:100vh; }
        .login-box { background:white; padding:20px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); width:300px; }
        .login-box h2 { text-align:center; margin-bottom:20px; }
        .login-box input { width:100%; padding:8px; margin:10px 0; border:1px solid #ccc; border-radius:4px; }
        .login-box button { width:100%; padding:10px; background:#007bff; color:white; border:none; border-radius:4px; cursor:pointer; }
        .login-box button:hover { background:#0056b3; }
        #error-msg { color:red; font-size:14px; margin-top:10px; text-align:center; }
    </style>
</head>
<body>

<div class="login-box">
    <h2 id="store-name">تسجيل الدخول</h2>
    <input type="password" id="password" placeholder="كلمة السر">
    <button id="login-btn">دخول</button>
    <div id="error-msg"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- Firebase config موحد -->
<script src="firebase.js"></script>

<script>
    // جلب اسم المتجر المختار
    const storeName = localStorage.getItem("selectedStore");
    if (!storeName) {
        alert("يرجى اختيار متجر أولاً");
        window.location.href = "stores.html";
    }
    document.getElementById("store-name").innerText = storeName;

    document.getElementById("login-btn").onclick = () => {
        const inputPass = document.getElementById("password").value.trim();

        if(!inputPass){
            document.getElementById("error-msg").innerText = "الرجاء إدخال كلمة السر";
            return;
        }

        database.ref("storePasswords/" + storeName).once("value")
            .then(snap => {
                if(!snap.exists()){
                    document.getElementById("error-msg").innerText = "لا توجد كلمة سر لهذا المتجر";
                    return;
                }
                const realPass = String(snap.val());
                if(inputPass === realPass){
                    localStorage.setItem("storeLoggedIn", storeName);
                    window.location.href = "dashboard.html";
                } else {
                    document.getElementById("error-msg").innerText = "كلمة السر خاطئة!";
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById("error-msg").innerText = "خطأ في الاتصال، حاول لاحقاً";
            });
    };
</script>

</body>
</html>
